name: LaraKube Cloud Pilot (Deploy to production)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY_HOST: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY_PROVIDER: ghcr

jobs:
  build:
    name: 🔨 Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🛰 Checkout repository
        uses: actions/checkout@v7

      - name: 🔍 Resolve & Verify Secrets
        id: secrets
        run: |
          # Robust resolution for KUBECONFIG
          FINAL_KUBE="${{ secrets.PRODUCTION_KUBECONFIG }}"

          # Robust resolution for ENV_FILE
          FINAL_ENV="${{ secrets.PRODUCTION_ENV_FILE_BASE64 }}"

          if [ -z "$FINAL_KUBE" ]; then
            echo "::error::PRODUCTION_KUBECONFIG is missing! Run 'larakube cloud:configure:gha' locally."
            exit 1
          fi

          if [ -z "$FINAL_ENV" ]; then
            echo "::error::PRODUCTION_ENV_FILE_BASE64 is missing! Run 'larakube cloud:configure:gha' locally."
            exit 1
          fi

          # Securely export using Heredoc to prevent truncation/mangling
          echo "E_DATA<<EOF" >> $GITHUB_ENV
          echo "$FINAL_ENV" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "✅ All secrets resolved successfully."

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, dom, fileinfo, filter, hash, mbstring, openssl, pcre, pdo, session, tokenizer, xml, zip
          tools: composer:v2

      - name: 📋 Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 📦 Install Composer dependencies
        run: composer install --optimize-autoloader --no-interaction --no-progress --ignore-platform-reqs

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🛠 Install Node dependencies
        run: npm install

      - name: 🏎 Generate Wayfinder files
        run: php artisan wayfinder:generate --with-form

      - name: 🛡 Create .env file
        run: |
          echo "$E_DATA" | base64 -d > .env

      - name: 💎 Inject VITE vars for asset baking
        run: |
          echo "VITE_APP_URL=https://staging-printing.vbtechsolutions.site" >> .env
          echo "VITE_ASSET_URL=https://staging-printing.vbtechsolutions.site" >> .env

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: 🐳 Build & Push Application Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.php
          push: true
          tags: ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          target: deploy
          secret-files: |
            dotenv=.env
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 🔬 Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: 🛰 Checkout repository
        uses: actions/checkout@v7
        with:
          sparse-checkout: .infrastructure

      - name: 🔍 Resolve & Verify Secrets
        run: |
          FINAL_KUBE="${{ secrets.PRODUCTION_KUBECONFIG }}"
          FINAL_ENV="${{ secrets.PRODUCTION_ENV_FILE_BASE64 }}"

          if [ -z "$FINAL_KUBE" ]; then
            echo "::error::PRODUCTION_KUBECONFIG is missing! Run 'larakube cloud:configure:gha' locally."
            exit 1
          fi

          if [ -z "$FINAL_ENV" ]; then
            echo "::error::PRODUCTION_ENV_FILE_BASE64 is missing! Run 'larakube cloud:configure:gha' locally."
            exit 1
          fi

          echo "K_DATA<<EOF" >> $GITHUB_ENV
          echo "$FINAL_KUBE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "E_DATA<<EOF" >> $GITHUB_ENV
          echo "$FINAL_ENV" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🕵️ Inspect Cluster Target
        run: |
          TARGET_URL=$(echo "$K_DATA" | grep "server:" | awk '{print $2}')
          echo "🚀 Deployment Target Cluster: $TARGET_URL"

          if [[ "$TARGET_URL" == *"127.0.0.1"* ]] || [[ "$TARGET_URL" == *"localhost"* ]]; then
            echo "::error::🚨 FATAL: Kubeconfig is targeting LOCALHOST ($TARGET_URL)!"
            echo "::error::This usually happens if your local context was active during secret upload."
            echo "::error::FIX: Run 'larakube cloud:configure:gha' again and ensure the CLI extracts your remote context."
            exit 1
          fi

      - name: 🔑 Set Kubernetes context
        uses: azure/k8s-set-context@v5
        with:
          method: kubeconfig
          kubeconfig: ${{ env.K_DATA }}

      - name: 🛡 Create .env file
        run: |
          echo "$E_DATA" | base64 -d > .env

      - name: 🏗 Prepare Manifests & Deploy
        run: |
          # 1. Update ConfigMap/Secret
          kubectl create configmap laravel-config -n printing-production --from-env-file=.env --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic laravel-secrets -n printing-production --from-env-file=.env --dry-run=client -o yaml | kubectl apply -f -

          # 2. Deploy via Kustomize. The namespace already exists (created at
          #    `cloud:configure:gha` time), and this runner uses a NAMESPACE-SCOPED
          #    credential — so strip the cluster-scoped Namespace doc, which the
          #    scoped ServiceAccount can't apply.
          cd .infrastructure/k8s/overlays/production
          kubectl kustomize . | sed "s|image: printing:production-latest|image: ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" | awk 'function flush(){if(!drop&&doc!=""){printf "%s",doc} doc="";drop=0} /^---[ \t\r]*$/{flush();print;next} {doc=doc $0 "\n"; if($0 ~ /^kind:[ \t]+Namespace[ \t\r]*$/)drop=1} END{flush()}' | kubectl apply -f -

          # 3. Wait for rollouts
          kubectl rollout status deployment/web -n printing-production --timeout=300s
          kubectl rollout status deployment/horizon -n printing-production --timeout=300s
          kubectl rollout status deployment/reverb -n printing-production --timeout=300s
          kubectl rollout status deployment/node-ssr -n printing-production --timeout=300s
